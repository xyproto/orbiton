on:
  workflow_dispatch:
  push:
    paths:
      - 'rec/*.tape'
      - '.github/workflows/record.yml'
name: Record
jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.24"
    - name: Build Orbiton
      run: cd v2 && go build -mod=vendor -o o && sudo cp o /usr/local/bin/
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc clang clangd ffmpeg
    - name: Install ttyd
      run: |
        curl -fsSL -o /tmp/ttyd "$(gh release view --repo tsl0922/ttyd --json assets --jq '.assets[] | select(.name | endswith("x86_64")) | .url')"
        sudo install /tmp/ttyd /usr/local/bin/ttyd
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Install vhs
      run: go install github.com/charmbracelet/vhs@latest
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rust-analyzer
    - name: Install Zig
      uses: mlugg/setup-zig@v2
    - name: Install zls
      run: |
        ZLS_URL="$(gh release view --repo zigtools/zls --json assets --jq '.assets[] | select(.name | test("x86_64-linux\\.tar")) | .url' | head -1)"
        curl -fsSL -o /tmp/zls.tar.xz "$ZLS_URL"
        tar xf /tmp/zls.tar.xz -C /tmp
        sudo install /tmp/zls /usr/local/bin/zls
      env:
        GH_TOKEN: ${{ github.token }}

    # Record simple C
    - name: Record simple_c
      run: cd rec && vhs simple_c.tape
    - name: Verify /tmp/main.c deleted
      run: |
        if [ -f /tmp/main.c ]; then
          echo "FAIL: /tmp/main.c was not deleted by the file browser"
          exit 1
        fi

    # Record simple C++
    - name: Record simple_cpp
      run: cd rec && vhs simple_cpp.tape
    - name: Verify /tmp/main.cpp deleted
      run: |
        if [ -f /tmp/main.cpp ]; then
          echo "FAIL: /tmp/main.cpp was not deleted by the file browser"
          exit 1
        fi

    # Record simple Rust
    - name: Record simple_rust
      run: cd rec && vhs simple_rust.tape
    - name: Verify /tmp/main.rs deleted
      run: |
        if [ -f /tmp/main.rs ]; then
          echo "FAIL: /tmp/main.rs was not deleted by the file browser"
          exit 1
        fi

    # Record simple Zig
    - name: Record simple_zig
      run: cd rec && vhs simple_zig.tape
    - name: Verify /tmp/main.zig deleted
      run: |
        if [ -f /tmp/main.zig ]; then
          echo "FAIL: /tmp/main.zig was not deleted by the file browser"
          exit 1
        fi

    - name: Commit recordings
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add rec/*.gif
        git diff --cached --quiet || git commit -m "Update recorded GIFs [skip ci]"
        git push

on:
  workflow_dispatch:
  push:
    paths:
      - 'rec/*.tape'
      - '.github/workflows/record.yml'
name: Record
jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.24"
    - name: Build Orbiton
      run: cd v2 && go build -mod=vendor -o o && sudo cp o /usr/local/bin/
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc clang clangd ffmpeg libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxdamage1 libpango-1.0-0 libcairo2 libasound2t64
    - name: Install ttyd
      run: |
        TTYD_URL="$(curl -fsSL https://api.github.com/repos/tsl0922/ttyd/releases/latest | grep -o 'https://[^"]*ttyd\.x86_64' | head -1)"
        curl -fsSL -o /tmp/ttyd "$TTYD_URL"
        sudo install /tmp/ttyd /usr/local/bin/ttyd
    - name: Install vhs
      run: go install github.com/charmbracelet/vhs@latest
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rust-analyzer
    - name: Install Zig
      uses: mlugg/setup-zig@v2
    - name: Install zls
      run: |
        ZLS_URL="$(curl -fsSL https://api.github.com/repos/zigtools/zls/releases/latest | grep -o 'https://[^"]*zls-x86_64-linux\.tar\.xz' | head -1)"
        curl -fsSL -o /tmp/zls.tar.xz "$ZLS_URL"
        tar xf /tmp/zls.tar.xz -C /tmp
        sudo install /tmp/zls /usr/local/bin/zls

    # Record simple C
    - name: Record simple_c
      run: cd rec && vhs simple_c.tape
      env:
        VHS_NO_SANDBOX: "1"
    - name: Verify /tmp/main.c deleted
      run: |
        if [ -f /tmp/main.c ]; then
          echo "FAIL: /tmp/main.c was not deleted by the file browser"
          exit 1
        fi

    # Record simple C++
    - name: Record simple_cpp
      run: cd rec && vhs simple_cpp.tape
      env:
        VHS_NO_SANDBOX: "1"
    - name: Verify /tmp/main.cpp deleted
      run: |
        if [ -f /tmp/main.cpp ]; then
          echo "FAIL: /tmp/main.cpp was not deleted by the file browser"
          exit 1
        fi

    # Record simple Rust
    - name: Record simple_rust
      run: cd rec && vhs simple_rust.tape
      env:
        VHS_NO_SANDBOX: "1"
    - name: Verify /tmp/main.rs deleted
      run: |
        if [ -f /tmp/main.rs ]; then
          echo "FAIL: /tmp/main.rs was not deleted by the file browser"
          exit 1
        fi

    # Record simple Zig
    - name: Record simple_zig
      run: cd rec && vhs simple_zig.tape
      env:
        VHS_NO_SANDBOX: "1"
    - name: Verify /tmp/main.zig deleted
      run: |
        if [ -f /tmp/main.zig ]; then
          echo "FAIL: /tmp/main.zig was not deleted by the file browser"
          exit 1
        fi

    - name: Commit recordings
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add rec/*.gif
        git diff --cached --quiet || git commit -m "Update recorded GIFs [skip ci]"
        git push

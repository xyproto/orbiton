on:
  workflow_dispatch:
  push:
    paths:
      - 'rec/*.tape'
      - '.github/workflows/record.yml'
name: Record
jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.x
    - name: Build Orbiton
      run: cd v2 && go build -mod=vendor -o o && sudo cp o /usr/local/bin/
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clangd ffmpeg
    - name: Install ttyd
      run: |
        curl -fsSL -o /tmp/ttyd "$(gh release view --repo tsl0922/ttyd --json assets --jq '.assets[] | select(.name | endswith("x86_64")) | .url')"
        sudo install /tmp/ttyd /usr/local/bin/ttyd
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Install vhs
      run: go install github.com/charmbracelet/vhs@latest
    - name: Record simplec
      run: cd rec && vhs simplec.tape
    - name: Upload recordings
      uses: actions/upload-artifact@v4
      with:
        name: recordings
        path: rec/*.gif
